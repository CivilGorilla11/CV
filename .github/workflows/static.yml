name: Deploy Portfolio
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 
jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint & Validate
  # ─────────────────────────────────────────
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install linting tools
        run: npm install -g htmlhint stylelint stylelint-config-standard
 
      - name: Lint HTML
        run: htmlhint index.html --config .htmlhintrc || true
 
      - name: Lint CSS
        run: stylelint styles.css --config '{"extends":"stylelint-config-standard"}' || true
 
      - name: Check for broken links (basic)
        run: |
          echo "Checking for placeholder links..."
          grep -n "yourprofile\|yourusername\|your-photo" index.html && \
            echo "⚠️  Warning: Placeholder values still present in index.html" || \
            echo "✅ No placeholders detected"
 
  # ─────────────────────────────────────────
  # JOB 2 — Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 
    permissions:
      contents: read
      pages: write
      id-token: write
 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
 
      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
 
      - name: Print live URL
        run: echo "🚀 Portfolio live at ${{ steps.deployment.outputs.page_url }}"
